<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#050914">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="DmaiHXCAI">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>DmaiHXCAI</title>
    <script>
      try {
        const theme = localStorage.getItem("dmaihxcai-theme") === "light" ? "light" : "dark";
        const savedBoardSkin = localStorage.getItem("dmaihxcai-board-skin");
        const boardSkin = savedBoardSkin === "gold" || savedBoardSkin === "stone" || savedBoardSkin === "pink" ? savedBoardSkin : "ice";
        document.documentElement.dataset.theme = theme;
        document.documentElement.dataset.boardSkin = boardSkin;
        document.querySelector('meta[name="theme-color"]').setAttribute("content", theme === "light" ? "#eaf6ff" : "#050914");
      } catch {}
    </script>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png">
    <link rel="preload" href="/assets/board/board-skin-dark.svg" as="image">
    <link rel="preload" href="/assets/board/board-skin-light.svg" as="image">
    <link rel="preload" href="/assets/board/board-skin-mobile.svg" as="image">
    <link rel="preload" href="/assets/board/board-skin-gold.svg" as="image">
    <link rel="preload" href="/assets/board/board-skin-stone.svg" as="image">
    <link rel="stylesheet" href="/styles.css?v=20260709-mobile-v47">
  </head>
  <body>
    <header class="app-header">
      <button id="backButton" class="nav-back" type="button" aria-label="Quay lại"></button>
      <div class="brand">
        <img class="brand-mark" src="/assets/icons/logob-header.png" alt="HXC">
        <div>
          <strong>DmaiHXCAI</strong>
          <small>Phân tích cờ tướng</small>
        </div>
      </div>
      <div class="theme-toggle" role="group" aria-label="Chọn giao diện">
        <button type="button" data-theme-choice="light" aria-pressed="false">Ánh sáng</button>
        <button type="button" data-theme-choice="dark" aria-pressed="false">Bóng đêm</button>
      </div>
    </header>

    <main class="shell">
      <section class="board-zone">
        <div class="mobile-top-toolbar" aria-label="Điều khiển phân tích nhanh">
          <button class="mobile-theme-btn" type="button" data-theme-toggle title="Đổi giao diện" aria-label="Đổi giao diện"><img src="/assets/icons/logob.png" alt="" draggable="false"></button>
          <button class="mobile-action-btn" type="button" data-mobile-action="undo" data-mobile-icon="mb2" title="Hoàn tác" aria-label="Hoàn tác"><img src="/assets/icons/mb2-dark.png" alt="" draggable="false"></button>
          <button class="mobile-action-btn" type="button" data-mobile-action="redo" data-mobile-icon="mb3" title="Tiếp theo" aria-label="Tiếp theo"><img src="/assets/icons/mb3-dark.png" alt="" draggable="false"></button>
          <button class="mobile-action-btn" type="button" data-mobile-action="analysis" data-mobile-icon="mb4" title="Phân tích" aria-label="Phân tích"><img src="/assets/icons/mb4-dark.png" alt="" draggable="false"></button>
          <button class="mobile-action-btn" type="button" data-mobile-action="flip" data-mobile-icon="mb5" title="Xoay bàn" aria-label="Xoay bàn"><img src="/assets/icons/mb5-dark.png" alt="" draggable="false"></button>
          <button class="mobile-action-btn" type="button" data-mobile-action="reset" data-mobile-icon="mb1" title="Đặt lại" aria-label="Đặt lại"><img src="/assets/icons/mb1-dark.png" alt="" draggable="false"></button>
          <button class="mobile-action-btn" type="button" data-mobile-action="cole" data-mobile-icon="cole" title="Chọn bàn cờ" aria-label="Chọn bàn cờ"><img src="/assets/icons/cole-dark.png" alt="" draggable="false"></button>
          <button class="mobile-action-btn" type="button" data-mobile-action="guom" data-mobile-icon="guom" title="Gươm" aria-label="Gươm"><img src="/assets/icons/guom-dark.png" alt="" draggable="false"></button>
        </div>
        <div id="boardSkinMenu" class="board-skin-menu hidden" role="menu" aria-label="Chọn màu bàn cờ">
          <button type="button" data-board-skin-choice="ice" role="menuitem">
            <span class="skin-swatch skin-swatch-ice" aria-hidden="true"></span>
            Xanh băng
          </button>
          <button type="button" data-board-skin-choice="gold" role="menuitem">
            <span class="skin-swatch skin-swatch-gold" aria-hidden="true"></span>
            Vàng cổ
          </button>
          <button type="button" data-board-skin-choice="stone" role="menuitem">
            <span class="skin-swatch skin-swatch-stone" aria-hidden="true"></span>
            Trắng đá
          </button>
          <button type="button" data-board-skin-choice="pink" role="menuitem">
            <span class="skin-swatch skin-swatch-pink" aria-hidden="true"></span>
            Hồng nhạt
          </button>
        </div>
        <div id="mobileScoreStrip" class="mobile-score-strip">Điểm 0</div>
        <div id="board" class="board" aria-label="Bàn cờ tướng">
          <div class="board-skin-layer" aria-hidden="true"></div>
          <canvas id="boardCanvas"></canvas>
          <canvas id="arrowCanvas"></canvas>
          <div id="pieces"></div>
          <div id="motionLayer" class="motion-layer" aria-hidden="true">
            <div id="capturePiece" class="motion-piece capture-piece" aria-hidden="true"><img class="piece-skin" alt="" draggable="false"></div>
            <div id="movingPiece" class="motion-piece moving-piece" aria-hidden="true"><img class="piece-skin" alt="" draggable="false"></div>
          </div>
          <div id="checkmateBurst" class="checkmate-burst" aria-hidden="true"><img src="/assets/effects/sat-cutout.png" alt="" draggable="false"></div>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-shell">
          <div class="panel-main-col">
            <div class="group primary-actions" data-mobile-panel="analysis">
              <button id="analyzeBtn" class="analyze-button"><span aria-hidden="true">⌕</span> Phân tích</button>
              <div id="analysis" class="analysis score-slot">
                <div class="score-banner equal"><span>Đánh giá</span><strong>0</strong><small>Cân bằng</small></div>
              </div>
            </div>

            <div class="group move-controls">
              <button id="undoBtn">Hoàn tác</button>
              <button id="redoBtn">Tiếp theo</button>
              <button id="resetBtn">Đặt lại</button>
              <button id="flipBtn" type="button">Xoay bàn cờ</button>
            </div>

            <div class="group board-tools" data-mobile-panel="tools">
              <div class="tool-row">
                <button id="loadFenBtn" type="button" data-mobile-icon="F↓" aria-label="Tải FEN" title="Tải FEN">Tải FEN</button>
                <button id="copyFenBtn" type="button" data-mobile-icon="F⧉" aria-label="Copy FEN" title="Copy FEN">Copy FEN</button>
              </div>
              <div class="tool-row">
                <button id="editBoardBtn" type="button" data-mobile-icon="✎" aria-label="Sửa bàn cờ" title="Sửa bàn cờ">Sửa bàn cờ</button>
                <button id="clearBoardBtn" type="button" data-mobile-icon="⌫" aria-label="Xóa bàn cờ" title="Xóa bàn cờ">Xóa bàn cờ</button>
              </div>
              <label>Quân đặt lên bàn</label>
              <div id="piecePalette" class="piece-palette"></div>
              <label>Bên đi</label>
              <select id="sideToMove">
                <option value="w">Đỏ</option>
                <option value="b">Đen</option>
              </select>
            </div>

            <div class="group auto-play-group" data-mobile-panel="ai">
              <label>AI tự chơi</label>
              <div class="toggles">
                <label><input id="aiRed" type="checkbox"> Đỏ</label>
                <label><input id="aiBlack" type="checkbox"> Đen</label>
                <button id="autoBtn">Bắt đầu</button>
              </div>
            </div>
          </div>

          <div class="panel-side-col">
            <div class="group cloud-group" data-mobile-panel="cloud">
              <h2><span>Nước cờ</span><span>Điểm</span><span class="cloud-extra-heading">%Thắng</span><span class="cloud-extra-heading">Ghi chú</span></h2>
              <div id="cloudBook" class="cloud-book">Đang tải dữ liệu...</div>
            </div>

            <div class="group history-group" data-mobile-panel="history">
              <h2>Lịch sử</h2>
              <ol id="history" class="history"></ol>
            </div>
          </div>
        </div>

        <div class="mobile-action-strip" aria-label="Điều khiển nhanh">
          <button class="mobile-action-btn" type="button" data-mobile-action="analysis" title="Phân tích" aria-label="Phân tích"><span aria-hidden="true">⌕</span></button>
          <button class="mobile-action-btn" type="button" data-mobile-action="cloud" title="Data book" aria-label="Data book"><span aria-hidden="true">DB</span></button>
          <button class="mobile-action-btn" type="button" data-mobile-action="undo" title="Hoàn tác" aria-label="Hoàn tác"><span aria-hidden="true">‹</span></button>
          <button class="mobile-action-btn" type="button" data-mobile-action="redo" title="Tiếp theo" aria-label="Tiếp theo"><span aria-hidden="true">›</span></button>
          <button class="mobile-action-btn" type="button" data-mobile-action="reset" title="Đặt lại" aria-label="Đặt lại"><span aria-hidden="true">↺</span></button>
          <button class="mobile-action-btn" type="button" data-mobile-action="flip" title="Xoay bàn cờ" aria-label="Xoay bàn cờ"><span aria-hidden="true">⇵</span></button>
          <button class="mobile-action-btn" type="button" data-mobile-action="tools" title="Công cụ" aria-label="Công cụ"><span aria-hidden="true">▣</span></button>
          <button class="mobile-action-btn" type="button" data-mobile-action="history" title="Lịch sử" aria-label="Lịch sử"><span aria-hidden="true">≣</span></button>
          <button class="mobile-action-btn" type="button" data-mobile-action="ai" title="AI tự chơi" aria-label="AI tự chơi"><span aria-hidden="true">AI</span></button>
        </div>
      </aside>
    </main>
    <div id="assetPreloadOverlay" class="asset-preload-overlay hidden" role="status" aria-live="polite" aria-label="Đang tải tài nguyên">
      <div class="asset-preload-card">
        <div class="asset-preload-spinner" aria-hidden="true"></div>
        <strong>Tải tài nguyên</strong>
        <div id="assetPreloadPercent" class="asset-preload-percent">0%</div>
        <div class="asset-preload-progress" aria-hidden="true">
          <span id="assetPreloadBar" class="asset-preload-progress-bar"></span>
        </div>
        <p id="assetPreloadText">Đang tải tài nguyên lần đầu để bàn cờ hiển thị mượt hơn...</p>
      </div>
    </div>
    <script src="/config.js"></script>
    <script src="/app.js?v=20260709-mobile-v58"></script>
    <script>
      const backButton = document.getElementById("backButton");
      if (backButton) {
        backButton.addEventListener("click", () => {
          try {
            const referrer = document.referrer ? new URL(document.referrer) : null;
            if (referrer && referrer.origin === location.origin) {
              history.back();
              return;
            }
          } catch {}
          location.href = "/";
        });
      }
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/service-worker.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
